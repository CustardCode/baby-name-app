<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Australian Baby Name Explorer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="intro">
        <div>
          <p class="eyebrow">Australian baby names</p>
          <h1>Search a name</h1>
        </div>
      </section>

      <article class="panel search-panel">
        <div class="panel-kicker">
          <span>Name history</span>
        </div>
        <div class="search-hero">
          <input id="nameSearch" type="search" placeholder="..." autocomplete="off" aria-label="Search a name" />
          <div class="auto-sex" aria-live="polite">
            <b id="searchSexLabel">Girl</b>
          </div>
        </div>
        <div id="searchSummary" class="search-summary"></div>
        <div id="nameStats" class="stats"></div>
        <div class="chart-card">
          <canvas id="trendCanvas" aria-label="Name ranking chart"></canvas>
          <div id="chartTooltip" class="chart-tooltip" role="status"></div>
        </div>
        <div id="yearCards" class="year-cards"></div>
      </article>

      <section class="browse-section" aria-label="Browse top names section">
        <div class="section-divider">
          <div>
            <p class="eyebrow">Browse top names</p>
            <h2>Choose a year and gender</h2>
          </div>
          <span>Top list</span>
        </div>

        <section class="controls" aria-label="Filters">
          <label>
            Gender
            <select id="sexSelect">
              <option value="boy">Boy</option>
              <option value="girl">Girl</option>
            </select>
          </label>

          <label>
            Year
            <select id="yearSelect"></select>
          </label>

          <label>
            Show
            <input id="limitInput" type="number" min="5" max="100" step="5" value="20" />
          </label>
        </section>

        <section class="grid">
          <article class="panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Ranking list</p>
                <h2 id="rankingTitle">Ranking list</h2>
              </div>
              <span id="recordCount" class="pill"></span>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Rank</th>
                    <th>Name</th>
                  </tr>
                </thead>
                <tbody id="rankingBody"></tbody>
              </table>
            </div>
          </article>
        </section>
      </section>

      <p class="data-note">
        The app uses the best public national ranking available for each year.
      </p>
    </main>

    <script src="./data/clean/baby_names_master.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
